name: Run Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r runner/requirements.txt
          
      - name: Run benchmark
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_VOICE: ${{ secrets.GROQ_VOICE }}
          SMALLEST_API_KEY: ${{ secrets.SMALLEST_API_KEY }}
          SMALLEST_VOICE_ID: ${{ secrets.SMALLEST_VOICE_ID }}
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_SPEAKER: ${{ secrets.SARVAM_SPEAKER }}
          SARVAM_MODEL: ${{ secrets.SARVAM_MODEL }}
          SARVAM_LANG: ${{ secrets.SARVAM_LANG }}
        run: |
          python runner/main.py --runs 5
          
      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/results.json
          git commit -m "Update benchmark results [skip ci]" || echo "No changes to commit"
          git push
